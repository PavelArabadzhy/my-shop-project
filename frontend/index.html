<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>MyShop — Products</title>
    <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
<header class="header">
    <div class="container header-inner">
        <a href="/" class="logo">MyShop</a>
        <nav class="nav">
            <a href="/" class="nav-link">Products</a>
            <a href="/cart" class="nav-link cart-link">
                Cart <span id="cart-count" class="cart-badge"></span>
            </a>
        </nav>
    </div>
</header>

<div class="hero-banner">
    <div class="container">
        <h1>Fresh drops.<br/>Bold style.</h1>
        <p>Explore our latest collection of premium streetwear — hoodies, tees, and caps built for every day.</p>
        <a href="#products" class="button button-accent button-inline">Shop now</a>
    </div>
</div>

<main class="container" id="products">
    <h2 class="page-title">Products</h2>
    <div id="product-grid" class="product-grid"></div>
</main>

<div class="footer-banner">
    <div class="container">
        <strong>MyShop</strong>
        <p>Quality streetwear. Fast delivery. No compromises.</p>
    </div>
</div>

<script src="./js/app.js"></script>
</body>
</html>
